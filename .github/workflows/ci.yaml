name: CI-CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest

      - name: Run tests
        run: pytest -v tests/

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tool
        run: pip install build

      - name: Build wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/multimodal-mlops:latest .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/multimodal-mlops:latest

  deploy-test:
    name: Container Smoke Test
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Pull Docker Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/multimodal-mlops:latest

      - name: Run Container in Help Mode
        run: |
          docker run --rm ${{ secrets.DOCKER_USERNAME }}/multimodal-mlops:latest python -m src.main --help || true
